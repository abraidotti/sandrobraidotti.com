name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::800703958614:role/github-actions-sandrobraidotti-com
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync . s3://abraidotti-sandrobraidotti-com \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2OFL6K1HFCZ4V \
            --paths "/*"
