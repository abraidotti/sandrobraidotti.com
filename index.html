<head>

  <title>sandrobraidotti.com</title>
</head>
<body>
  <p id="sentence"></p>
  <script>
    const sentences = [
      "The cloud is just someone else's computer.",
      "There are only two hard problems in computer science: cache invalidation, naming things, and off-by-one errors.",
      "Security is not a product, it's a process.",
      "The best time to patch was yesterday. The second best time is now.",
      "Complexity is the enemy of security.",
      "Every system is perfectly designed to get the results it gets.",
      "If you think technology can solve your security problems, you don't understand the problems and you don't understand the technology.",
      "The internet is a series of tubes filled with other people's mistakes.",
      "In theory, there's no difference between theory and practice. In practice, there is.",
      "Move fast and patch things.",
    ];
    document.getElementById("sentence").textContent =
      sentences[Math.floor(Math.random() * sentences.length)];
  </script>
</body>
